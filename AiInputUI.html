<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background-color: #f8f9fa;
        color: #333;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        color: #5f6368;
      }
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
      }
      button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 14px;
        margin-top: 10px;
      }
      button:hover {
        background-color: #1557b0;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .disclaimer {
        font-size: 12px;
        color: #5f6368;
        margin-top: 10px;
        text-align: center;
      }
      #statusMessage {
        margin-top: 15px;
        padding: 10px;
        border-radius: 4px;
        display: none;
        font-weight: bold;
        text-align: center;
      }
      .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
  </head>
  <body>
    
    <div class="form-group">
      <label for="rawText">🤖 AI Autonomous Input:</label>
      <textarea id="rawText" rows="6" placeholder="Paste unstructured text here... (e.g., 'Bro, sold 2 Sepatu Kaca to Mr. Budi')" required></textarea>
    </div>

    <button id="submitBtn" onclick="processAI()">Send to Gemini AI</button>
    <div class="disclaimer">The AI will read your text, map it to the correct Item ID, and log the transaction automatically.</div>
    <div id="statusMessage"></div>

    <script>
      function processAI() {
        const btn = document.getElementById('submitBtn');
        const rawText = document.getElementById('rawText').value.trim();

        if (!rawText) {
          showStatus('Please paste some text first.', 'error');
          return;
        }

        btn.disabled = true;
        btn.innerText = 'AI is thinking... 🧠';
        showStatus('Analyzing intent and matching inventory...', 'success');

        google.script.run
          .withSuccessHandler(function(response) {
            btn.disabled = false;
            btn.innerText = 'Send to Gemini AI';
            if (response.success) {
              showStatus(`Success! Logged ${response.parsed.type} of ${response.parsed.quantity} for ${response.parsed.itemId}.`, 'success');
              document.getElementById('rawText').value = '';
              setTimeout(() => google.script.host.close(), 3000);
            } else {
              showStatus('AI Error: ' + response.message, 'error');
            }
          })
          .withFailureHandler(function(error) {
            btn.disabled = false;
            btn.innerText = 'Send to Gemini AI';
            showStatus('System Error: ' + error.message, 'error');
          })
          .processAutonomousInput(rawText);
      }

      function showStatus(msg, className) {
        const div = document.getElementById('statusMessage');
        div.textContent = msg;
        div.className = className;
        div.style.display = 'block';
      }
    </script>
  </body>
</html>
