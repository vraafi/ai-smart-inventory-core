<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #F8FAFC; color: #334155; padding: 15px; font-size: 14px; }
    
    .tabs { display: flex; border-bottom: 2px solid #E2E8F0; margin-bottom: 15px; }
    .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 600; }
    .tab.active { border-bottom-color: #3B82F6; color: #3B82F6; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
    input[type="text"], input[type="number"], select, input[type="file"] {
      width: 100%; padding: 10px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 13px;
    }
    input:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    
    .btn {
      width: 100%; padding: 10px; background: #10B981; color: white; border: none;
      border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px;
    }
    .btn:hover { background: #059669; }
    .btn:disabled { background: #94A3B8; cursor: not-allowed; }
    .btn-secondary { background: #3B82F6; }
    .btn-secondary:hover { background: #2563EB; }
    
    .status { margin-top: 15px; text-align: center; font-size: 13px; font-weight: bold; }
    
    /* Preview Table */
    #previewSection { display: none; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    th, td { border: 1px solid #E2E8F0; padding: 8px; text-align: left; }
    th { background: #F1F5F9; font-weight: 600; }
    td input { width: 100%; padding: 4px; border: 1px solid transparent; font-size: 12px; }
    td input:focus { border: 1px solid #3B82F6; }
    .delete-row { color: #EF4444; cursor: pointer; font-weight: bold; text-align: center; display: block; }
    
    .divider { text-align: center; margin: 10px 0; color: #94A3B8; font-weight: bold; }
  </style>
</head>
<body>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('manual')">Input Manual</div>
    <div class="tab" onclick="switchTab('bulk')">Import Massal</div>
  </div>

  <!-- MANUAL ONBOARDING -->
  <div id="tab-manual" class="tab-content active">
    <div class="form-group">
      <label>Nama Barang *</label>
      <input type="text" id="name" placeholder="Contoh: Yakult 5 Pack">
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <input type="text" id="category" placeholder="Contoh: Minuman">
    </div>
    <div class="form-group">
      <label>Harga Beli (Modal) - Rp</label>
      <input type="number" id="buyPrice" placeholder="Contoh: 8000">
    </div>
    <div class="form-group">
      <label>Harga Jual - Rp</label>
      <input type="number" id="price" placeholder="Contoh: 11000">
    </div>
    <div class="form-group">
      <label>Stok Awal</label>
      <input type="number" id="stock" placeholder="Contoh: 50" value="0">
    </div>
    <button class="btn" id="saveBtn" onclick="saveItem()">Simpan Barang Baru</button>
    <div id="status-manual" class="status"></div>
  </div>

  <!-- BULK ONBOARDING -->
  <div id="tab-bulk" class="tab-content">
    <div class="form-group">
      <label>Upload File (CSV, PDF, PNG, JPG)</label>
      <input type="file" id="bulkFile" accept=".csv, .pdf, .png, .jpg, .jpeg">
    </div>
    <div class="divider">ATAU</div>
    <div class="form-group">
      <label>Link Google Sheets</label>
      <input type="text" id="bulkLink" placeholder="https://docs.google.com/spreadsheets/d/...">
    </div>
    
    <button class="btn btn-secondary" id="extractBtn" onclick="extractData()">🔍 Ekstrak Data</button>
    <div id="status-bulk" class="status"></div>
    
    <div id="previewSection">
      <label>Preview & Edit Data:</label>
      <div style="overflow-x: auto;">
        <table id="previewTable">
          <thead>
            <tr>
              <th>Aksi</th>
              <th>Nama Barang</th>
              <th>Kategori</th>
              <th>Harga Modal</th>
              <th>Harga Jual</th>
              <th>Stok</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
      <button class="btn" id="saveBulkBtn" onclick="saveBulkData()">💾 Simpan Semua Data</button>
    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    // --- MANUAL ONBOARDING ---
    function saveItem() {
      const name = document.getElementById("name").value.trim();
      if (!name) return alert("Nama barang wajib diisi!");
      
      const btn = document.getElementById("saveBtn");
      const stat = document.getElementById("status-manual");
      btn.disabled = true; btn.innerText = "Menyimpan..."; stat.innerText = "";
      
      const formObj = {
        name: name,
        category: document.getElementById("category").value.trim() || "General",
        buyPrice: parseFloat(document.getElementById("buyPrice").value) || 0,
        price: parseFloat(document.getElementById("price").value) || 0,
        stock: parseFloat(document.getElementById("stock").value) || 0
      };
      
      google.script.run
        .withSuccessHandler(() => {
          stat.style.color = "#10B981"; stat.innerText = "✅ Berhasil disimpan!";
          setTimeout(() => google.script.host.close(), 1500);
        })
        .withFailureHandler(err => {
          stat.style.color = "#EF4444"; stat.innerText = "❌ Gagal: " + err.message;
          btn.disabled = false; btn.innerText = "Simpan Barang Baru";
        })
        .processOnboarding(formObj);
    }

    // --- BULK ONBOARDING ---
    function extractData() {
      const fileInput = document.getElementById("bulkFile");
      const linkInput = document.getElementById("bulkLink").value.trim();
      
      if (!fileInput.files.length && !linkInput) {
        return alert("Pilih file atau masukkan link Google Sheets!");
      }
      
      const btn = document.getElementById("extractBtn");
      const stat = document.getElementById("status-bulk");
      btn.disabled = true; btn.innerText = "⏳ Mengekstrak (AI memproses)..."; stat.innerText = "";
      document.getElementById("previewSection").style.display = "none";
      
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64 = e.target.result.split(',')[1];
          google.script.run
            .withSuccessHandler(onExtractSuccess)
            .withFailureHandler(onExtractFail)
            .parseBulkMedia(base64, file.type, file.name);
        };
        reader.readAsDataURL(file);
      } else {
        google.script.run
          .withSuccessHandler(onExtractSuccess)
          .withFailureHandler(onExtractFail)
          .parseBulkUrl(linkInput);
      }
      
      function onExtractFail(err) {
        stat.style.color = "#EF4444"; stat.innerText = "❌ Gagal: " + err.message;
        btn.disabled = false; btn.innerText = "🔍 Ekstrak Data";
      }
    }
    
    function onExtractSuccess(dataArray) {
      const btn = document.getElementById("extractBtn");
      const stat = document.getElementById("status-bulk");
      btn.disabled = false; btn.innerText = "🔍 Ekstrak Data";
      
      if (!dataArray || dataArray.length === 0) {
        stat.style.color = "#EF4444"; stat.innerText = "❌ Tidak ada data barang yang ditemukan.";
        return;
      }
      
      stat.style.color = "#10B981"; stat.innerText = "✅ " + dataArray.length + " baris diekstrak!";
      renderPreviewTable(dataArray);
      document.getElementById("previewSection").style.display = "block";
    }
    
    function renderPreviewTable(dataArray) {
      const tbody = document.getElementById("previewBody");
      tbody.innerHTML = "";
      
      dataArray.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><span class="delete-row" onclick="this.parentElement.parentElement.remove()">X</span></td>
          <td><input type="text" class="prev-name" value="${item.name || ''}" placeholder="Nama"></td>
          <td><input type="text" class="prev-cat" value="${item.category || 'General'}"></td>
          <td><input type="number" class="prev-buy" value="${item.buyPrice || 0}"></td>
          <td><input type="number" class="prev-price" value="${item.price || 0}"></td>
          <td><input type="number" class="prev-stock" value="${item.stock || 0}"></td>
        `;
        tbody.appendChild(tr);
      });
    }
    
    function saveBulkData() {
      const rows = document.querySelectorAll("#previewBody tr");
      if (rows.length === 0) return alert("Tidak ada data untuk disimpan.");
      
      const payload = [];
      rows.forEach(tr => {
        payload.push({
          name: tr.querySelector(".prev-name").value.trim(),
          category: tr.querySelector(".prev-cat").value.trim(),
          buyPrice: parseFloat(tr.querySelector(".prev-buy").value) || 0,
          price: parseFloat(tr.querySelector(".prev-price").value) || 0,
          stock: parseFloat(tr.querySelector(".prev-stock").value) || 0
        });
      });
      
      const btn = document.getElementById("saveBulkBtn");
      const stat = document.getElementById("status-bulk");
      btn.disabled = true; btn.innerText = "⏳ Menyimpan..."; stat.innerText = "";
      
      google.script.run
        .withSuccessHandler(() => {
          stat.style.color = "#10B981"; stat.innerText = "✅ " + payload.length + " barang berhasil didaftarkan!";
          setTimeout(() => google.script.host.close(), 2000);
        })
        .withFailureHandler(err => {
          stat.style.color = "#EF4444"; stat.innerText = "❌ Gagal: " + err.message;
          btn.disabled = false; btn.innerText = "💾 Simpan Semua Data";
        })
        .processBulkOnboarding(payload);
    }
  </script>
</body>
</html>
