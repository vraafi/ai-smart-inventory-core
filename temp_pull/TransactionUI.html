<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background-color: #f8f9fa;
        color: #333;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        color: #5f6368;
      }
      input[type="text"], input[type="number"], select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
      }
      button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 14px;
        margin-top: 10px;
      }
      button:hover {
        background-color: #1557b0;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .radio-group {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
      }
      .radio-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .radio-item input {
        margin: 0;
      }
      #statusMessage {
        margin-top: 15px;
        padding: 10px;
        border-radius: 4px;
        display: none;
        font-weight: bold;
        text-align: center;
      }
      .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
  </head>
  <body>
    
    <div class="form-group">
      <label>Transaction Type:</label>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="type" value="IN" checked> Stock IN (Restock)
        </label>
        <label class="radio-item">
          <input type="radio" name="type" value="OUT"> Stock OUT (Sale/Loss)
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="itemId">Item ID:</label>
      <input type="text" id="itemId" placeholder="e.g., ITM-123456" required>
    </div>

    <div class="form-group">
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" min="1" placeholder="Enter amount" required>
    </div>

    <div class="form-group">
      <label for="notes">Notes / Proof / Receipt:</label>
      <textarea id="notes" rows="3" placeholder="Optional notes..."></textarea>
    </div>

    <button id="submitBtn" onclick="submitData()">Submit Transaction</button>
    <div id="statusMessage"></div>

    <script>
      function submitData() {
        const btn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('statusMessage');
        
        const type = document.querySelector('input[name="type"]:checked').value;
        const itemId = document.getElementById('itemId').value.trim();
        const quantity = document.getElementById('quantity').value;
        const notes = document.getElementById('notes').value.trim();

        if (!itemId || !quantity || quantity <= 0) {
          showStatus('Please fill in Item ID and a valid Quantity.', 'error');
          return;
        }

        btn.disabled = true;
        btn.innerText = 'Processing...';
        showStatus('Sending securely...', 'success'); // Just using success color for info

        const data = {
          type: type,
          itemId: itemId,
          quantity: parseInt(quantity, 10),
          notes: notes
        };

        google.script.run
          .withSuccessHandler(function(response) {
            btn.disabled = false;
            btn.innerText = 'Submit Transaction';
            if (response.success) {
              showStatus('Transaction logged successfully!', 'success');
              document.getElementById('itemId').value = '';
              document.getElementById('quantity').value = '';
              document.getElementById('notes').value = '';
              setTimeout(() => google.script.host.close(), 1500);
            } else {
              showStatus('Error: ' + response.message, 'error');
            }
          })
          .withFailureHandler(function(error) {
            btn.disabled = false;
            btn.innerText = 'Submit Transaction';
            showStatus('System Error: ' + error.message, 'error');
          })
          .processTransaction(data);
      }

      function showStatus(msg, className) {
        const div = document.getElementById('statusMessage');
        div.textContent = msg;
        div.className = className;
        div.style.display = 'block';
      }
    </script>
  </body>
</html>
