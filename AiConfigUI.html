<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Google Sans', 'Segoe UI', sans-serif; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
    h3 { color: #00d4ff; margin-bottom: 6px; font-size: 15px; }
    p.hint { font-size: 11px; color: #888; margin-bottom: 10px; line-height: 1.4; }
    .section { background: #16213e; border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid #0f3460; }
    
    label { font-size: 12px; color: #a0a0b0; display: block; margin-bottom: 4px; margin-top: 10px; }
    input[type="text"], select {
      width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 8px;
      background: #0a0a23; color: #fff; font-size: 13px; margin-bottom: 6px;
      outline: none; transition: border-color 0.3s;
    }
    input[type="text"]:focus, select:focus { border-color: #00d4ff; }
    
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: bold; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-save { background: linear-gradient(135deg, #00d4ff, #0099ff); color: #000; }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,212,255,0.4); }
    .btn-test { background: linear-gradient(135deg, #ff9800, #f57c00); color: #000; }
    .btn-test:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(255,152,0,0.4); }
    .btn-test:disabled, .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    #status { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 12px; display: none; text-align: center; }
    .success { background: #1b5e20; color: #a5d6a7; display: block !important; }
    .error { background: #b71c1c; color: #ffcdd2; display: block !important; }
    .info { background: #0d47a1; color: #90caf9; display: block !important; }
    .provider-hint { font-size: 10px; color: #76b900; margin-top: 2px; font-style: italic; }

    #customUrlField { display: none; }
  </style>
</head>
<body>

  <div class="section">
    <h3>🤖 Universal AI Configuration</h3>
    <p class="hint">Select AI provider, enter API Key and model name. Endpoint URL is filled automatically.</p>
    
    <label>AI Provider</label>
    <select id="aiProvider" onchange="toggleProvider()">
      <option value="nvidia">🟢 NVIDIA (NIM API)</option>
      <option value="groq">⚡ Groq (Ultra Fast)</option>
      <option value="anthropic">🟠 Claude (Anthropic)</option>
      <option value="openrouter">🌐 OpenRouter (Multi-Model)</option>
      <option value="openai">💎 OpenAI (GPT-4o)</option>
      <option value="gemini_native">🔵 Google AI Studio (Gemini)</option>
      <option value="custom">⚙️ Custom Endpoint (Manual URL)</option>
    </select>
    <div id="providerHint" class="provider-hint">✅ NVIDIA NIM — URL automatically filled</div>

    <div id="customUrlField">
      <label>Endpoint URL (Custom)</label>
      <input type="text" id="endpointUrl" placeholder="https://your-api.com/v1/chat/completions" />
    </div>

    <label>Model ID</label>
    <input type="text" id="modelId" placeholder="Example: meta/llama-3.3-70b-instruct" />

    <label>API Key (Required)</label>
    <input type="text" id="apiKey" placeholder="Enter your API Key here..." />
  </div>

  <div class="btn-row">
    <button class="btn-test" id="btnTest" onclick="testConfig()">🔌 Test Connection</button>
    <button class="btn-save" id="btnSave" onclick="saveConfig()">💾 Save</button>
  </div>
  <div id="status"></div>

  <script>
    var PROVIDER_MAP = {
      "nvidia":        { url: "https://integrate.api.nvidia.com/v1/chat/completions", model: "meta/llama-3.3-70b-instruct", hint: "✅ NVIDIA NIM — URL automatically filled", internal: "openrouter" },
      "groq":          { url: "https://api.groq.com/openai/v1/chat/completions",      model: "llama-3.3-70b-versatile",     hint: "✅ Groq — URL automatically filled", internal: "openrouter" },
      "anthropic":     { url: "https://api.anthropic.com/v1/messages",                 model: "claude-sonnet-4-20250514",    hint: "✅ Claude (Anthropic) — URL automatically filled", internal: "openrouter" },
      "openrouter":    { url: "https://openrouter.ai/api/v1/chat/completions",         model: "meta-llama/llama-3.3-70b-instruct", hint: "✅ OpenRouter — URL automatically filled", internal: "openrouter" },
      "openai":        { url: "https://api.openai.com/v1/chat/completions",            model: "gpt-4o-mini",                 hint: "✅ OpenAI — URL automatically filled", internal: "openrouter" },
      "gemini_native": { url: "",                                                       model: "gemini-2.5-flash",            hint: "✅ Google AI Studio — URL not needed", internal: "gemini_native" },
      "custom":        { url: "",                                                       model: "",                            hint: "⚙️ Enter endpoint URL manually", internal: "openrouter" }
    };

    // Reverse map: endpoint URL → UI provider key
    var URL_TO_PROVIDER = {};
    Object.keys(PROVIDER_MAP).forEach(function(k) {
      if (PROVIDER_MAP[k].url) URL_TO_PROVIDER[PROVIDER_MAP[k].url] = k;
    });

    // ── Load saved config on dialog open ──
    google.script.run
      .withSuccessHandler(function(cfg) {
        if (!cfg || !cfg.success) return;
        
        // Determine which provider dropdown to select based on saved endpoint
        var selectedProvider = '';
        if (cfg.provider === 'gemini_native') {
          selectedProvider = 'gemini_native';
        } else if (cfg.endpoint && URL_TO_PROVIDER[cfg.endpoint]) {
          selectedProvider = URL_TO_PROVIDER[cfg.endpoint];
        } else if (cfg.endpoint) {
          selectedProvider = 'custom';
          document.getElementById('endpointUrl').value = cfg.endpoint;
          document.getElementById('customUrlField').style.display = 'block';
        }
        
        if (selectedProvider) {
          document.getElementById('aiProvider').value = selectedProvider;
          var info = PROVIDER_MAP[selectedProvider];
          if (info) document.getElementById('providerHint').textContent = info.hint;
        }
        
        if (cfg.model) document.getElementById('modelId').value = cfg.model;
        if (cfg.apiKey) document.getElementById('apiKey').value = cfg.apiKey;
      })
      .withFailureHandler(function() {})
      .loadAIConfig();

    function toggleProvider() {
      var provider = document.getElementById('aiProvider').value;
      var info = PROVIDER_MAP[provider];
      var customField = document.getElementById('customUrlField');
      var hintEl = document.getElementById('providerHint');
      
      customField.style.display = (provider === 'custom') ? 'block' : 'none';
      if (info.model) document.getElementById('modelId').value = info.model;
      hintEl.textContent = info.hint;
    }

    function getEndpointUrl() {
      var provider = document.getElementById('aiProvider').value;
      var info = PROVIDER_MAP[provider];
      return (provider === 'custom') 
        ? document.getElementById('endpointUrl').value.trim() 
        : info.url;
    }

    function getInternalProvider() {
      var provider = document.getElementById('aiProvider').value;
      return PROVIDER_MAP[provider].internal;
    }

    function setStatus(type, msg) {
      var el = document.getElementById('status');
      el.className = type;
      el.textContent = msg;
    }

    function testConfig() {
      var provider = document.getElementById('aiProvider').value;
      var endpointUrl = getEndpointUrl();
      var modelId = document.getElementById('modelId').value.trim();
      var apiKey = document.getElementById('apiKey').value.trim();

      if (!apiKey) { setStatus('error', '❌ API Key is required to test.'); return; }
      if (!modelId) { setStatus('error', '❌ Model ID is required to test.'); return; }

      var btn = document.getElementById('btnTest');
      btn.disabled = true;
      btn.textContent = '⏳ Testing...';
      setStatus('info', '🔄 Contacting ' + provider.toUpperCase() + '...');

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = '🔌 Test Connection';
          if (result.success) {
            setStatus('success', '✅ ' + result.message);
          } else {
            setStatus('error', '❌ ' + result.message);
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = '🔌 Test Connection';
          setStatus('error', '❌ System Error: ' + err.message);
        })
        .testSimpleAIConfig(getInternalProvider(), endpointUrl, modelId, apiKey);
    }

    function saveConfig() {
      var endpointUrl = getEndpointUrl();
      var modelId = document.getElementById('modelId').value.trim();
      var apiKey = document.getElementById('apiKey').value.trim();
      var internalProvider = getInternalProvider();

      if (!apiKey) { setStatus('error', '❌ API Key is required.'); return; }
      if (!modelId) { setStatus('error', '❌ Model ID is required.'); return; }

      var btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = '⏳ Saving...';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = '💾 Save';
          if (result.success) {
            setStatus('success', '✅ Konfigurasi terSave! API Key & Model ID aman terSave.');
          } else {
            setStatus('error', '❌ ' + result.message);
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = '💾 Save';
          setStatus('error', '❌ Error: ' + err.message);
        })
        .saveUniversalConfig(internalProvider, endpointUrl, modelId, apiKey);
    }
  </script>
</body>
</html>
